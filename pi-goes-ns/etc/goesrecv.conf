# GOES-19 (GOES-East) HRIT @ 1694.1 MHz — Nooelec SMArTee XTR v5 (E4000), SAWbird+ GOES LNA
[demodulator]
mode = "hrit"
source = "rtlsdr"

[rtlsdr]
frequency = 1694100000
sample_rate = 2400000
gain = 24
bias_tee = true
device_index = 0

[costas]
max_deviation = 200e3

# Packet stream consumed by goesproc (localhost only)
[decoder.packet_publisher]
bind = "tcp://0.0.0.0:5004"
send_buffer = 1048576

# Stats for monitoring (localhost only)
[demodulator.stats_publisher]
bind = "tcp://127.0.0.1:6001"
[decoder.stats_publisher]
bind = "tcp://127.0.0.1:6002"

[monitor]
statsd_address = "udp4://localhost:8125"
