#   camera.wx_spc_outlook  MODDY1US  SPC Day 1 Convective Outlook
#   camera.wx_spc_day1     G16CIRUS  CONUS East IR 2km (GOES-19)
#   camera.wx_tropical     CSA001US  NHC Tropical Surface Analysis
#   camera.wx_surface      G02HURUS  Tropical Atlantic Enhanced IR
#   camera.wx_radar        RADSTHES  Southeast US Radar
